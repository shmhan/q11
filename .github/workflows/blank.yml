name: Sync Gist to Repo
on:
  # 保留手动触发（必要时可手动执行）
  workflow_dispatch:
  # 定时触发：每天凌晨 2 点（UTC 时间，注意时区转换）
  schedule:
    - cron: '0 2 * * *'

jobs:
  sync-gist:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前 GitHub 仓库到运行环境
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 2. 克隆 Gist 仓库（修复端口解析错误）
      - name: Clone Gist Repository
        env:
          GIST_ID: "79892c1a70b3a5864afa4734de7e109b"  # 你的 Gist ID（无需修改）
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}        # 你的 Secrets 令牌
        run: |
          # 创建临时目录
          mkdir -p ~/gist-temp
          
          # 配置 Git 凭证（核心修复：避开 URL 拼接令牌导致的解析错误）
          git config --global credential.helper store
          echo "https://${GIST_TOKEN}:x-oauth-basic@gist.github.com" > ~/.git-credentials
          
          # 克隆 Gist（纯 URL 格式，无令牌拼接）
          git clone https://gist.github.com/${GIST_ID}.git ~/gist-temp
          
          # 验证克隆结果（方便排查问题）
          echo "=== Gist 克隆文件列表 ==="
          ls -la ~/gist-temp
          echo "=== 确认 sing-box 文件存在 ==="
          if [ -f ~/gist-temp/sing-box ]; then
            echo "✅ sing-box 文件克隆成功"
          else
            echo "❌ sing-box 文件未找到"
            exit 1
          fi

      # 3. 复制 Gist 中的目标文件到 GitHub 仓库
      - name: Copy Gist File to Repo
        run: |
          # 复制 Gist 中的 sing-box 文件到仓库根目录
          cp ~/gist-temp/sing-box ./sing-box
          # 如需同步多个文件，新增 cp 命令即可
          # cp ~/gist-temp/文件2.sh ./scripts/文件2.sh

      # 4. 提交并推送变更到 GitHub 仓库
      - name: Commit and Push Changes
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_EMAIL}"
          git add .
          # 仅当有文件变更时提交，避免空提交
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync from Gist: $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
