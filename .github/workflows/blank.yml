name: Sync Gist to Repo
on:
  # 保留手动触发（必要时可手动执行）
  workflow_dispatch:
  # 定时触发：每天凌晨 2 点（UTC 时间，注意时区转换）
  schedule:
    - cron: '0 2 * * *'

jobs:
  sync-gist:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前 GitHub 仓库到运行环境
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 2. 克隆 Gist 仓库（核心步骤）
      - name: Clone Gist Repository
        env:
          GIST_ID: "79892c1a70b3a5864afa4734de7e109b"          # 替换为你的 Gist ID
          GITHUB_USERNAME: "ylm1982@gmail.com" # 替换为你的 GitHub 用户名
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          mkdir -p ~/gist-temp
          git clone https://${GITHUB_USERNAME}:${GIST_TOKEN}@gist.github.com/${GIST_ID}.git ~/gist-temp

      # 3. 复制 Gist 中的目标文件到 GitHub 仓库
      - name: Copy Gist File to Repo
        run: |
          # 替换为实际的 Gist 文件名和仓库目标路径
          cp ~/gist-temp/sing-box ./sing-box
          # 如需同步多个文件，新增 cp 命令即可
          # cp ~/gist-temp/文件2.sh ./scripts/文件2.sh

      # 4. 提交并推送变更到 GitHub 仓库
      - name: Commit and Push Changes
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_EMAIL}"
          git add .
          # 仅当有文件变更时提交，避免空提交
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync from Gist: $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
