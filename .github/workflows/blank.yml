name: Sync Gist to Repo
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  sync-gist:
    runs-on: ubuntu-latest
    permissions:
      # 关键：赋予 Actions 推送代码的权限
      contents: write
    steps:
      # 1. 检出当前 GitHub 仓库（修改 persist-credentials 为 false，避免权限冲突）
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 禁用默认凭证
          fetch-depth: 0              # 拉取完整历史，避免推送冲突

      # 2. 直接下载 Gist 文件（已成功，保留）
      - name: Download Gist File Directly
        env:
          GIST_RAW_URL: "https://gist.githubusercontent.com/shmhan/79892c1a70b3a5864afa4734de7e109b/raw/c6489afcede13bac825169197988cff7fb4e92ee/sing-box"
        run: |
          mkdir -p ~/gist-temp
          curl -sSL "${GIST_RAW_URL}" -o ~/gist-temp/sing-box
          echo "=== 验证下载结果 ==="
          ls -la ~/gist-temp
          if [ -f ~/gist-temp/sing-box ]; then
            echo "✅ sing-box 文件下载成功"
            head -5 ~/gist-temp/sing-box
          else
            echo "❌ sing-box 文件下载失败"
            exit 1
          fi

      # 3. 复制文件到仓库
      - name: Copy Gist File to Repo
        run: |
          cp ~/gist-temp/sing-box ./sing-box

      # 4. 提交并推送变更（使用 PAT 令牌授权推送）
      - name: Commit and Push Changes
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EMAIL: ${{ github.actor }}@users.noreply.github.com
          # 使用你之前创建的 GIST_TOKEN（或单独创建的 PAT 令牌）进行推送
          PAT_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_EMAIL}"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync from Gist: $(date '+%Y-%m-%d %H:%M:%S')"
            # 使用 PAT 令牌推送，避免权限不足
            git push https://${PAT_TOKEN}@github.com/${{ github.repository }}.git main
          fi
