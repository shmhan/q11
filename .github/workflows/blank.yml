name: Sync Gist to Repo
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  sync-gist:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前 GitHub 仓库
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 2. 直接下载 Gist 文件（替代克隆，彻底解决 URL 问题）
      - name: Download Gist File Directly
        env:
          # Gist 原始文件的完整 URL（从你的 Gist Raw 页面复制）
          GIST_RAW_URL: "https://gist.githubusercontent.com/shmhan/79892c1a70b3a5864afa4734de7e109b/raw/c6489afcede13bac825169197988cff7fb4e92ee/sing-box"
        run: |
          # 创建临时目录
          mkdir -p ~/gist-temp
          
          # 直接下载文件（无需 Git 克隆，避开 URL 解析问题）
          curl -sSL "${GIST_RAW_URL}" -o ~/gist-temp/sing-box
          
          # 验证文件是否下载成功
          echo "=== 验证下载结果 ==="
          ls -la ~/gist-temp
          if [ -f ~/gist-temp/sing-box ]; then
            echo "✅ sing-box 文件下载成功"
            # 可选：查看文件前几行确认内容
            head -5 ~/gist-temp/sing-box
          else
            echo "❌ sing-box 文件下载失败"
            exit 1
          fi

      # 3. 复制文件到仓库（和原逻辑一致）
      - name: Copy Gist File to Repo
        run: |
          cp ~/gist-temp/sing-box ./sing-box

      # 4. 提交并推送变更（和原逻辑一致）
      - name: Commit and Push Changes
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_EMAIL}"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync from Gist: $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
